name: Build ed3dgs image

on:
  push:
    paths:
      - 'ed3dgs/**'
    branches: [master, main]
  workflow_dispatch:
    inputs:
      tool:
        description: 'Tool name (subdirectory)'
        default: 'ed3dgs'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache
          sudo docker image prune -af

      - name: Compute image tag
        id: meta
        run: |
          TOOL=ed3dgs
          ENV_HASH=$(cat ${TOOL}/environment.yml ${TOOL}/requirements.txt 2>/dev/null | sha256sum | cut -c1-7)
          echo "hash=${ENV_HASH}" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${{ github.repository_owner }}/${TOOL}" >> $GITHUB_OUTPUT
          echo "tool=${TOOL}" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.hash }}" &>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get project Dockerfile
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          GH_TOKEN="$GH_TOKEN" gh api \
            repos/wgsong0110/session-web/contents/Dockerfile.project \
            -q '.content' | base64 -d > Dockerfile.project

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        run: |
          TOOL=ed3dgs
          cp ${TOOL}/environment.yml environment.yml
          cp ${TOOL}/requirements.txt requirements.txt
          docker build \
            --build-arg PROJECT_NAME="${TOOL}" \
            -f Dockerfile.project \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.hash }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            .
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.hash }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
