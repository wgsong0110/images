name: LifeGS
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch::pytorch=2.5.1
  - pytorch::pytorch-cuda=12.1
  - pytorch::torchvision=0.20.1
  - numpy<2
  - scipy<1.14
  - matplotlib
  - tqdm
  - pyyaml
  - pillow
  - conda-forge::colmap=*=cuda*  # CUDA-enabled prebuilt (GPU patch_match_stereo); no compile needed
  - pip
  - pip:
    - -r requirements.txt
